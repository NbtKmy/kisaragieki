<!DOCTYPE html>
<html lang="ja">
<head>

</head>
<body class="mode-both">

    <div class="header-controls">
        <span>表示設定:</span>

    <div class="thread-container">

        <div style="text-align: center; color: #555; padding: 20px; font-weight: bold; border-top: 1px solid #ccc;">

        </div>

    <div class="footer-form">
        <form>
            名前： <input type="text" value="あなたのうしろに名無しさんが・・・" size="30"><br>
            E-mail： <input type="text" value="sage" size="30"><br>
            <textarea rows="5" style="width:100%"></textarea><br>
            <button type="button">書き込む</button>
        </form>
    </div>

    <script src="script.js"></script>
